name: Deploy Plugin
on:
  push:
    branches: [main, production]
  workflow_dispatch:
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}
      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts
      - name: Ensure remote plugin directory (staging)
        if: github.ref == 'refs/heads/main'
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "mkdir -p ${{ secrets.HOSTINGER_PATH_STAGING }}"
      - name: Deploy to Staging
        if: github.ref == 'refs/heads/main'
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude '.github' --exclude '.gitignore' \
            --exclude 'node_modules' --exclude 'vendor' \
            --exclude '*.zip' --exclude '*.log' --exclude '*.bak' \
            --exclude 'README.md' \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH_STAGING }}/
      - name: Ensure remote plugin directory (production)
        if: github.ref == 'refs/heads/production'
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} "mkdir -p ${{ secrets.HOSTINGER_PATH_PRODUCTION }}"
      - name: Deploy to Production
        if: github.ref == 'refs/heads/production'
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude '.github' --exclude '.gitignore' \
            --exclude 'node_modules' --exclude 'vendor' \
            --exclude '*.zip' --exclude '*.log' --exclude '*.bak' \
            --exclude 'README.md' \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH_PRODUCTION }}/
      - name: Deploy summary
        run: echo "::notice::Deploy completo para ref=${{ github.ref }}"
